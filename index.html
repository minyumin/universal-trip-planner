<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Universal Trip Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f9fa;--surface:#fff;--border:#eef0f2;
  --text:#2d3436;--muted:#636e72;--accent:#e67e22;
  --blue:#0984e3;--r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);padding-bottom:120px;font-size:14px;}

.trip-nav{background:#fff; border-bottom:1px solid var(--border); padding:10px 15px; position:sticky; top:0; z-index:200; display:flex; align-items:center; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.trip-select{flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; font-weight:700; font-size:15px; color:var(--blue); background:#fcfdfe; outline:none;}
.btn-new-trip{background:var(--blue); color:#fff; border:none; width:38px; height:38px; border-radius:8px; font-weight:700; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;}

.main{max-width:500px; margin:0 auto; padding:15px;}
.card{background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05);}
.field{margin-bottom:14px;}
.field label{display:block; font-size:11px; color:var(--muted); margin-bottom:6px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;}
.finp,.fsel{width:100%; padding:12px; border:1px solid #edf2f7; border-radius:var(--rs); font-size:14px; background:#fcfdfe; outline:none;}

.chip-row{display:flex; gap:8px; flex-wrap:wrap; user-select:none;}
.chip{padding:6px 14px; border-radius:20px; border:1px solid #edf2f7; font-size:12px; cursor:pointer; background:#fff; color:var(--muted); font-weight:500;}
.chip.sel{background:var(--text); color:#fff; border-color:var(--text);}
.btn-add-sm{width:28px; height:28px; border-radius:50%; border:1px dashed var(--muted); background:none; cursor:pointer; color:var(--muted); font-size:16px;}

.date-group-hd { margin: 25px 0 12px 5px; font-weight: 700; font-size: 15px; color: var(--blue); display: flex; align-items: center; gap: 10px; }
.date-group-hd::after { content:''; flex:1; height:1px; background: linear-gradient(to right, var(--border), transparent); }

.item{background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:12px; display:flex; align-items:flex-start; gap:12px;}
.item.editing { border: 2px solid var(--accent); background:#fff9f5; }
.item-check{width:22px; height:22px; margin-top:16px; cursor:pointer; accent-color: var(--blue);}
.item-info{flex:1; min-width:0;}
.item-name{font-size:16px; font-weight:700; color:#2d3436; margin-bottom:4px;}
.item-addr{font-size:12px; color:var(--muted); margin-bottom:8px;}
.item-time-pill{display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px; background:#e1f5fe; color:#0288d1; font-weight:700; margin-bottom:8px;}

.btn-main{width:100%; padding:15px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); font-weight:700; cursor:pointer;}
.map-gen-fixed{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:92%; max-width:450px; padding:18px; background:var(--blue); color:#fff; border:none; border-radius:35px; font-weight:700; cursor:pointer; box-shadow:0 8px 25px rgba(9, 132, 227, 0.4); z-index:1000; text-align:center;}
.btn-icon{width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:#fff; cursor:pointer; margin-bottom:8px; display:flex; align-items:center; justify-content:center;}

.pill{font-size:10px; background:#f1f2f6; padding:3px 8px; border-radius:6px; color:var(--muted); margin-right:4px; font-weight:500;}
</style>
</head>
<body>

<div class="trip-nav">
  <select id="trip-selector" class="trip-select" onchange="switchTrip(this.value)"></select>
  <button class="btn-new-trip" onclick="createNewTrip()">+</button>
</div>

<div class="main">
  <div class="card" id="form-container">
    <div class="field"><label>分類</label><div class="chip-row" id="type-chips"></div></div>
    <div class="field"><label>行程地點 *</label><input id="inp-name" class="finp" placeholder="地點名稱"/></div>
    <div class="field"><label>地址</label><input id="inp-addr" class="finp" placeholder="可填寫地址或地標"/></div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="field"><label>日期</label><select id="inp-day" class="fsel"></select></div>
      <div class="field">
        <label>時段</label>
        <select id="inp-time" class="fsel"><option value="">未定</option><option value="早晨">🌅 早晨</option><option value="上午">🌤 上午</option><option value="午餐">🍴 午餐</option><option value="下午">🌇 下午</option><option value="晚餐">🥘 晚餐</option><option value="深夜">🌙 深夜</option></select>
      </div>
    </div>
    
    <div class="field"><label>參與者</label><div class="chip-row" id="participant-chips"></div></div>
    <div class="field"><label>備註</label><input id="inp-note" class="finp" placeholder="重要提醒..."/></div>
    <div class="field"><label>Maps 連結 (自動解析)</label><input id="inp-url" class="finp" placeholder="貼上連結自動帶入店名" onpaste="setTimeout(parseUrl, 100)"/></div>
    
    <button id="submit-btn" class="btn-main" onclick="submitForm()">儲存行程</button>
    <button id="cancel-btn" style="display:none; width:100%; margin-top:12px; border:none; background:none; color:var(--muted); cursor:pointer;" onclick="resetForm()">取消編輯</button>
    
    <div style="margin-top:25px; border-top:1px dashed var(--border); padding-top:15px; text-align:center; display:flex; flex-direction:column; gap:10px;">
        <button style="border:none; color:var(--blue); background:none; font-size:12px; cursor:pointer; font-weight:700;" onclick="exportTripData()">📥 匯出此行程備份 (JSON)</button>
        <button style="border:none; color:#ff7675; background:none; font-size:11px; cursor:pointer; font-weight:700;" onclick="deleteTrip()">🗑️ 刪除整趟旅行計畫</button>
    </div>
  </div>

  <div id="list-container"></div>
</div>

<button id="map-btn" class="map-gen-fixed" onclick="openMultiMap()">🗺️ 生成地圖路線 (已勾選項目)</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, remove, update, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBBGZFrs0ISC9eTvOYDIaiI5734Q0J3iHw",
  authDomain: "universal-trip-planner-bf963.firebaseapp.com",
  databaseURL: "https://universal-trip-planner-bf963-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "universal-trip-planner-bf963",
  storageBucket: "universal-trip-planner-bf963.firebasestorage.app",
  messagingSenderId: "789155833204",
  appId: "1:789155833204:web:93d67a14c31069120ab821"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);
const DB_PATH = 'universal_trip_planner';

// --- 狀態控制 ---
let participantsList = ['Pei','Lulu','Melanie','Yoyo','Min'];
let customTypes = ['景點','小吃','餐廳','咖啡廳','住宿','交通'];
const TIME_ORDER = { "早晨":1, "上午": 2, "午餐": 3, "下午": 4, "晚餐": 5, "深夜": 6, "": 7 };

let trips = {}, currentTripID = '', allItems = [], editingKey = null;
let selectedType = '景點', selectedWho = [];

// 1. 初始化
onValue(ref(db, `${DB_PATH}/meta`), snap => {
  trips = snap.val() || {};
  const select = document.getElementById('trip-selector');
  const entries = Object.entries(trips);
  
  if(entries.length === 0) {
    select.innerHTML = '<option value="">(點擊右方 + 建立新旅行)</option>';
    // 如果完全沒資料，主動彈出建立視窗
    if(!currentTripID) setTimeout(createNewTrip, 500); 
    return;
  }
  
  select.innerHTML = entries.map(([id, t]) => `<option value="${id}">${t.name}</option>`).join('');
  if(!currentTripID) switchTrip(entries[0][0]);
});

// 2. 切換旅行
window.switchTrip = (id) => {
  if(!id) return;
  currentTripID = id;
  document.getElementById('trip-selector').value = id;
  const trip = trips[id];
  
  // 生成日期
  const dates = getDatesArray(trip.start, trip.end);
  document.getElementById('inp-day').innerHTML = '<option value="">未定</option>' + dates.map(d => `<option value="${d}">${d}</option>`).join('');
  
  // 抓取資料
  onValue(ref(db, `${DB_PATH}/data/${id}/items`), snap => {
    allItems = Object.entries(snap.val() || {}).map(([key, val]) => ({ key, ...val }));
    renderList();
  });
  
  // 重設表單參與者為全員
  selectedWho = [...participantsList];
  renderFormUI();
};

// 3. 建立新旅行 (強化版：確保順序正確)
window.createNewTrip = async () => {
  const name = prompt("旅行名稱 (如：東京 5 日遊)");
  if (!name) return;
  const start = prompt("開始日期 (YYYY-MM-DD)", "2026-04-03");
  const end = prompt("結束日期 (YYYY-MM-DD)", "2026-04-05");

  if (start && end) {
    try {
      const newRef = push(ref(db, `${DB_PATH}/meta`));
      const newId = newRef.key; // 先拿到新的 ID
      
      // 使用 set 寫入資料
      await set(newRef, { name, start, end });
      
      // 關鍵：手動更新本地的 trips 物件，避免 onValue 延遲
      trips[newId] = { name, start, end };
      
      // 立即切換到該 ID
      switchTrip(newId);
      
      alert(`已建立旅行：${name}`);
    } catch (error) {
      console.error("建立失敗:", error);
      alert("建立失敗，請檢查網路或 Firebase 規則設定。");
    }
  }
};

// 4. UI 渲染 (包含自訂參與者邏輯)
window.renderFormUI = () => {
  // 分類
  document.getElementById('type-chips').innerHTML = customTypes.map(t => `<div class="chip ${selectedType===t?'sel':''}" onclick="selectType('${t}')">${t}</div>`).join('') + `<button class="btn-add-sm" onclick="addType()">+</button>`;
  
  // 參與者
  const whoHtml = [`<div class="chip ${selectedWho.length===participantsList.length && participantsList.length>0?'sel':''}" onclick="toggleAllWho()">全員</div>`].concat(participantsList.map(p => `<div class="chip ${selectedWho.includes(p)?'sel':''}" onclick="toggleWho('${p}')">${p}</div>`));
  document.getElementById('participant-chips').innerHTML = whoHtml.join('') + `<button class="btn-add-sm" onclick="addWho()">+</button>`;
};

window.addWho = () => {
    const name = prompt("新增參與者姓名：");
    if(name && !participantsList.includes(name)) {
        participantsList.push(name);
        selectedWho.push(name);
        renderFormUI();
    }
};

window.addType = () => {
    const type = prompt("新增行程分類：");
    if(type && !customTypes.includes(type)) {
        customTypes.push(type);
        selectedType = type;
        renderFormUI();
    }
};

window.submitForm = () => {
  const name = document.getElementById('inp-name').value.trim();
  if(!currentTripID) return alert("請先建立或選擇一個旅行");
  if(!name) return alert("地點名稱為必填");
  
  const data = {
    type: selectedType, name, addr: document.getElementById('inp-addr').value.trim(),
    url: document.getElementById('inp-url').value || '',
    day: document.getElementById('inp-day').value || '',
    time: document.getElementById('inp-time').value || '',
    who: selectedWho, note: document.getElementById('inp-note').value || '', ts: Date.now()
  };
  
  const target = `${DB_PATH}/data/${currentTripID}/items`;
  if(editingKey) update(ref(db, `${target}/${editingKey}`), data);
  else push(ref(db, target), data);
  resetForm();
};

window.renderList = () => {
  let list = [...allItems].sort((a,b) => {
    if(a.day !== b.day) return (a.day || '9/9') > (b.day || '9/9') ? 1 : -1;
    return (TIME_ORDER[a.time] || 99) - (TIME_ORDER[b.time] || 99);
  });

  let html = '', lastDay = '';
  list.forEach(item => {
    if(item.day !== lastDay) {
      html += `<div class="date-group-hd">📅 ${item.day || "日期未定"}</div>`;
      lastDay = item.day;
    }
    const cleanTripName = trips[currentTripID].name.replace(/之旅|旅行/g, '');
    const mapUrl = item.url || `https://www.google.com/maps/search/$/${encodeURIComponent(cleanTripName + " " + item.name)}`;
    
    html += `
    <div class="item ${editingKey === item.key ? 'editing' : ''}">
      <input type="checkbox" class="item-check" data-name="${item.name}" checked>
      <div class="item-info">
        <div class="item-name">${item.name} <span style="font-size:10px; color:var(--blue); border:1px solid; padding:1px 4px; border-radius:4px;">${item.type}</span></div>
        ${item.addr ? `<div class="item-addr">📍 ${item.addr}</div>` : ''}
        ${item.time ? `<div class="item-time-pill">⏰ ${item.time}</div>` : ''}
        <div style="margin-bottom:8px;"><a href="${mapUrl}" target="_blank" style="color:var(--blue); font-size:12px; font-weight:700; text-decoration:none;">🗺️ 查看地圖</a></div>
        <div>${(item.who || []).map(w => `<span class="pill">${w}</span>`).join('')}</div>
        ${item.note ? `<div class="item-note">💡 ${item.note}</div>` : ''}
      </div>
      <div style="display:flex; flex-direction:column; gap:5px;">
        <button class="btn-icon" onclick="editItem('${item.key}')">✏️</button>
        <button class="btn-icon" onclick="delItem('${item.key}')">🗑️</button>
      </div>
    </div>`;
  });
  document.getElementById('list-container').innerHTML = html || '<div style="text-align:center; padding:50px; color:var(--muted);">目前尚無行程</div>';
};

// 工具函式
function getDatesArray(start, end) {
  const arr = [];
  let dt = new Date(start);
  const endDt = new Date(end);
  while(dt <= endDt) {
    const w = ["(日)","(一)","(二)","(三)","(四)","(五)","(六)"][dt.getDay()];
    arr.push(`${dt.getMonth()+1}/${dt.getDate()} ${w}`);
    dt.setDate(dt.getDate() + 1);
  }
  return arr;
}

window.editItem = (key) => {
  const item = allItems.find(i => i.key === key);
  editingKey = key;
  document.getElementById('inp-name').value = item.name;
  document.getElementById('inp-addr').value = item.addr || '';
  document.getElementById('inp-day').value = item.day || '';
  document.getElementById('inp-time').value = item.time || '';
  document.getElementById('inp-note').value = item.note || '';
  document.getElementById('inp-url').value = item.url || '';
  selectedType = item.type; selectedWho = item.who || [];
  document.getElementById('submit-btn').innerText = "儲存修改";
  document.getElementById('cancel-btn').style.display = 'block';
  renderFormUI(); window.scrollTo({top:0, behavior:'smooth'});
};

window.resetForm = () => {
  editingKey = null;
  ['inp-name','inp-addr','inp-url','inp-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('submit-btn').innerText = "儲存行程";
  document.getElementById('cancel-btn').style.display = 'none';
  selectedType = '景點'; selectedWho = [...participantsList]; renderFormUI();
};

window.delItem = (key) => { if(confirm("確定刪除？")) remove(ref(db, `${DB_PATH}/data/${currentTripID}/items/${key}`)); };

window.deleteTrip = () => {
  if(confirm(`警告：將刪除「${trips[currentTripID].name}」的所有行程，確定嗎？`)) {
    remove(ref(db, `${DB_PATH}/meta/${currentTripID}`));
    remove(ref(db, `${DB_PATH}/data/${currentTripID}`));
    location.reload();
  }
};

window.exportTripData = () => {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({tripName: trips[currentTripID].name, items: allItems}, null, 2));
    const dlNode = document.createElement('a');
    dlNode.setAttribute("href", dataStr);
    dlNode.setAttribute("download", `${trips[currentTripID].name}.json`);
    dlNode.click();
};

window.openMultiMap = () => {
  const checked = document.querySelectorAll('.item-check:checked');
  if(!checked.length) return alert("請勾選地點");
  const prefix = trips[currentTripID].name.replace(/之旅|旅行/g, '');
  const names = Array.from(checked).map(cb => encodeURIComponent(prefix + " " + cb.getAttribute('data-name')));
  window.open("https://www.google.com/maps/dir//" + names.join('/'), '_blank');
};

window.parseUrl = () => {
  setTimeout(() => {
    const input = document.getElementById('inp-url').value;
    const match = decodeURIComponent(input).match(/\/place\/([^\/\?]+)/);
    if(match) document.getElementById('inp-name').value = match[1].replace(/\+/g, ' ');
  }, 100);
};

window.selectType = (t) => { selectedType = t; renderFormUI(); };
window.toggleWho = (p) => { selectedWho = selectedWho.includes(p) ? selectedWho.filter(x=>x!==p) : [...selectedWho, p]; renderFormUI(); };
window.toggleAllWho = () => { selectedWho = (selectedWho.length === participantsList.length) ? [] : [...participantsList]; renderFormUI(); };

renderFormUI();
</script>
</body>
</html>
