<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>高雄小旅行</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f2ed;--surface:#fff;--surface2:#faf8f5;--border:#e8e3db;
  --text:#1a1612;--muted:#8a7f72;--faint:#c5bdb0;
  --accent:#c85a2a;--accent-light:#f5ede7;
  --blue:#2a6cbf;--blue-l:#e8f0fb;
  --green:#2a7a4a;--green-l:#e8f5ee;
  --amber:#b87a1a;--amber-l:#fdf3e0;
  --purple:#6a4abf;--purple-l:#f0ecfb;
  --red:#bf2a2a;--red-l:#fbe8e8;
  --teal:#1a8a7a;--teal-l:#e8f8f5;
  --pink:#bf2a7a;--pink-l:#fbe8f3;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:200;}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.live{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.main{max-width:500px;margin:0 auto;padding:14px 14px 40px;}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.tab-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;padding-bottom:2px;}
.tab-scroll::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s;}
.tab.active{background:var(--text);color:#fff;border-color:var(--text);}
.cnt{font-size:10px;opacity:.6;margin-left:2px;}

.sort-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--muted);white-space:nowrap;}
.sort-btn.active{border-color:var(--accent);color:var(--accent);}

.map-all-btn{width:100%;padding:10px;background:var(--blue-l);color:var(--blue);border:1px solid #c5d8f5;border-radius:var(--rs);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;margin-bottom:14px;transition:background .15s;}
.map-all-btn:active{background:#d5e6f8;}

/* Add form */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}

.url-row{position:relative;margin-bottom:4px;}
.url-row input{width:100%;padding:9px 64px 9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;}
.url-row input:focus{border-color:var(--accent);}
.parse-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);padding:5px 11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;}
.url-hint{font-size:11px;color:var(--faint);margin-bottom:10px;}
.parsed-ok{font-size:11px;color:var(--green);margin-bottom:10px;display:none;}
.extracted-info{background:var(--green-l);border-radius:var(--rs);padding:8px 10px;margin-bottom:10px;font-size:12px;color:var(--green);display:none;line-height:1.6;}

.sep{height:1px;background:var(--border);margin:10px 0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.grid1{margin-bottom:8px;}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:3px;}
.finp,.fsel{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;}

/* Type + participant chips in form */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.fchip{padding:4px 12px;border-radius:14px;border:1px solid var(--border);font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface2);color:var(--muted);}
.fchip.sel{background:var(--text);color:#fff;border-color:var(--text);}

/* Custom type input */
.custom-type-row{display:none;margin-top:6px;}
.custom-type-row input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;width:100%;}

.add-btn{width:100%;margin-top:12px;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;}

/* List */
.day-group{margin-bottom:20px;}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.group-label{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.group-line{flex:1;height:1px;background:var(--border);}

.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;display:flex;gap:11px;margin-bottom:8px;}
.item-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;line-height:1.3;}
.item-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center;}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500;}
.item-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.item-op-time{font-size:11px;color:var(--amber);margin-top:3px;display:flex;align-items:center;gap:4px;}
.item-time{font-size:11px;color:var(--blue);margin-top:3px;}
.item-note{font-size:12px;color:var(--faint);margin-top:4px;line-height:1.5;}
.item-who{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.who-pill{padding:2px 8px;border-radius:8px;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.item-actions{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.map-btn{padding:4px 9px;background:var(--blue-l);color:var(--blue);border:1px solid #c5d8f5;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;text-decoration:none;}
.del-btn{padding:3px 6px;background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;line-height:1;}

.empty{text-align:center;padding:36px 20px;color:var(--faint);font-size:14px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>🌴 高雄小旅行</h1>
      <div class="header-sub" id="trip-sub">共同行程規劃</div>
    </div>
    <div class="live" id="live-badge"><span class="dot"></span>即時同步</div>
  </div>
</div>

<div class="main">

  <div class="toolbar">
    <div class="tab-scroll" id="tabs">
      <button class="tab active" onclick="setTab('全部')">全部 <span class="cnt" id="cnt-all"></span></button>
    </div>
    <button class="sort-btn" id="sort-time-btn" onclick="setSort('time')">⏰ 時間</button>
    <button class="sort-btn" id="sort-area-btn" onclick="setSort('area')">📍 地區</button>
  </div>

  <button class="map-all-btn" onclick="openAllMaps()">🗺 在 Google Maps 查看所有地點</button>

  <div class="add-card">
    <div class="card-title">新增地點</div>

    <div class="url-row">
      <input id="inp-url" type="url" placeholder="貼上 Google Maps 連結（選填）" oninput="onUrlChange()"/>
      <button class="parse-btn" onclick="parseUrl()">解析</button>
    </div>
    <div class="url-hint" id="url-hint">貼上連結後點「解析」，自動帶入名稱與地區</div>
    <div class="parsed-ok" id="parsed-ok">✓ 已連結 Google Maps</div>
    <div class="extracted-info" id="extracted-info"></div>

    <div class="sep"></div>

    <div class="grid1 field">
      <label>地點名稱 *</label>
      <input class="finp" id="inp-name" placeholder="例：旗津老街"/>
    </div>

    <div class="grid2">
      <div class="field">
        <label>地區</label>
        <input class="finp" id="inp-area" placeholder="例：旗津"/>
      </div>
      <div class="field">
        <label>營業時間</label>
        <input class="finp" id="inp-op-time" placeholder="例：09:00-21:00"/>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label>時段（選填）</label>
        <div class="chip-row" id="time-chips"></div>
        <input class="finp" id="inp-exact-time" type="text" inputmode="numeric" placeholder="輸入時間，如 14:30" style="margin-top:6px;display:none;" onblur="formatTime(this)"/>
      </div>
      <div class="field">
        <label>日期（選填）</label>
        <select class="fsel" id="inp-day">
          <option value="">未定</option>
          <option value="4/3">4/3（四）</option>
          <option value="4/4">4/4（五）</option>
          <option value="4/5">4/5（六）</option>
        </select>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label>新增者</label>
        <select class="fsel" id="inp-by">
          <option value="">請選擇</option>
          <option value="Pei">Pei</option>
          <option value="Lulu">Lulu</option>
          <option value="Melanie">Melanie</option>
          <option value="Yoyo">Yoyo</option>
          <option value="Min">Min</option>
        </select>
      </div>
      <div class="field">
        <label>類型</label>
        <div class="chip-row" id="type-chips"></div>
      </div>
    </div>

    <div class="field grid1" style="margin-top:8px;">
      <label>參與者（可多選）</label>
      <div class="chip-row" id="participant-chips"></div>
    </div>

    <div class="grid1 field" style="margin-top:8px;">
      <label>備註</label>
      <input class="finp" id="inp-note" placeholder="推薦理由、費用…"/>
    </div>

    <button class="add-btn" onclick="addItem()">+ 加入清單</button>
  </div>

  <div id="list-container"><div class="empty">載入中…</div></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, remove, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ====================================================
// 🔧 Firebase 設定 (已統一變數名稱)
// ====================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDnDKwh2a9qVqDcgZtUjEjh8uCe07FHAzo",
  authDomain: "kaohsiung-trip.firebaseapp.com",
  databaseURL: "https://kaohsiung-trip-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kaohsiung-trip",
  storageBucket: "kaohsiung-trip.firebasestorage.app",
  messagingSenderId: "17984792690",
  appId: "1:17984792690:web:8a4e4734140eb099dffaeb"
};

const DEFAULT_PARTICIPANTS = ['Pei','Lulu','Melanie','Yoyo','Min'];
const DEFAULT_TYPES = ['景點','小吃','咖啡廳','住宿','購物','其他'];
const TYPE_COLORS = {
  '景點':['#2a6cbf','#e8f0fb'],'小吃':['#b87a1a','#fdf3e0'],
  '咖啡廳':['#2a7a4a','#e8f5ee'],'住宿':['#6a4abf','#f0ecfb'],
  '購物':['#bf2a7a','#fbe8f3'],'其他':['#8a7f72','#f5f2ed']
};
const DAY_COLORS = {'4/3':'#6a4abf','4/4':'#2a7a4a','4/5':'#c85a2a','':`#8a7f72`};
const DAY_ORDER = {'4/3':0,'4/4':1,'4/5':2,'':3};
const TIME_SLOTS = ['上午','中午','下午','晚上'];
const TIME_ORDER = {'上午':0,'中午':1,'下午':2,'晚上':3,'':4};
const TIME_ICONS = {'上午':'🌤','中午':'☀️','下午':'🌇','晚上':'🌙'};

let db, itemsRef, typesRef;
let allItems = {};
let customTypes = [];
let activeTab = '全部';
let sortMode = 'time';
let parsedUrl = '';
let selectedParticipants = [];
let selectedType = '景點';
let selectedTime = '';

// ---- Firebase init ----
function initFirebase() {
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    itemsRef = ref(db, 'kaohsiung-trip/items');
    typesRef = ref(db, 'kaohsiung-trip/types');

    onValue(itemsRef, snap => { allItems = snap.val() || {}; renderList(); updateTabs(); });
    onValue(typesRef, snap => { customTypes = snap.val() || []; renderTypeChips(); });
  } catch(e) {
    console.error("Firebase 連線失敗:", e);
    allItems = {}; renderList(); updateTabs();
  }
}

// ---- UI Renders ----
function renderParticipantChips() {
  const el = document.getElementById('participant-chips');
  el.innerHTML = DEFAULT_PARTICIPANTS.map(p =>
    `<button class="fchip${selectedParticipants.includes(p)?' sel':''}" onclick="toggleParticipant('${p}')">${p}</button>`
  ).join('');
}
window.toggleParticipant = function(p) {
  if(selectedParticipants.includes(p)) selectedParticipants = selectedParticipants.filter(x=>x!==p);
  else selectedParticipants.push(p);
  renderParticipantChips();
};

function renderTimeChips() {
  const el = document.getElementById('time-chips');
  const isCustom = selectedTime === '自訂';
  el.innerHTML = TIME_SLOTS.map(t => `<button class="fchip${selectedTime === t?' sel':''}" onclick="toggleTime('${t}')">${TIME_ICONS[t]} ${t}</button>`).join('') +
  `<button class="fchip${isCustom?' sel':''}" onclick="toggleTime('自訂')">🕐 自訂</button>`;
  document.getElementById('inp-exact-time').style.display = isCustom ? 'block' : 'none';
}
window.toggleTime = function(t) {
  selectedTime = selectedTime === t ? '' : t;
  renderTimeChips();
};

function renderTypeChips() {
  const allTypes = [...DEFAULT_TYPES, ...customTypes];
  const el = document.getElementById('type-chips');
  el.innerHTML = allTypes.map(t => {
    const isSel = selectedType===t;
    return `<button class="fchip${isSel?' sel':''}" onclick="selectType('${t}')">${t}</button>`;
  }).join('');
}
window.selectType = function(t) { selectedType = t; renderTypeChips(); };

// ---- URL Parsing ----
const AREA_KEYWORDS = ['鹽埕','旗津','苓雅','前金','三民','左營','鼓山','楠梓','鳳山','新興','岡山','橋頭','旗山','美濃'];

window.parseUrl = async function() {
  const url = document.getElementById('inp-url').value.trim();
  if(!url) return;
  const btn = document.querySelector('.parse-btn');
  btn.textContent = '...';

  try {
    const decoded = decodeURIComponent(url);
    // 1. 抓取店名
    let nameMatch = decoded.match(/\/place\/([^\/\?]+)/);
    if(nameMatch) {
      let name = nameMatch[1].replace(/\+/g, ' ');
      document.getElementById('inp-name').value = name;
    }
    // 2. 抓取地區
    for(const kw of AREA_KEYWORDS) {
      if(decoded.includes(kw)) {
        document.getElementById('inp-area').value = kw + '區';
        break;
      }
    }
    document.getElementById('parsed-ok').style.display = 'block';
    document.getElementById('url-hint').style.display = 'none';
  } catch(e) { console.error("解析失敗", e); }
  btn.textContent = '解析';
};

window.onUrlChange = function() {
  if(!document.getElementById('inp-url').value) {
    document.getElementById('parsed-ok').style.display = 'none';
    document.getElementById('url-hint').style.display = 'block';
  }
};

// ---- Add Item ----
window.addItem = function() {
  const name = document.getElementById('inp-name').value.trim();
  if(!name) return;

  const item = {
    name,
    type: selectedType,
    opTime: document.getElementById('inp-op-time').value.trim(),
    day: document.getElementById('inp-day').value,
    area: document.getElementById('inp-area').value.trim(),
    time: selectedTime === '自訂' ? document.getElementById('inp-exact-time').value : selectedTime,
    exactTime: selectedTime === '自訂' ? document.getElementById('inp-exact-time').value : '',
    by: document.getElementById('inp-by').value || '匿名',
    note: document.getElementById('inp-note').value.trim(),
    url: document.getElementById('inp-url').value.trim(),
    participants: selectedParticipants.length ? [...selectedParticipants] : DEFAULT_PARTICIPANTS,
    ts: Date.now()
  };

  if(db) push(itemsRef, item);
  
  // Reset
  ['inp-name','inp-op-time','inp-area','inp-note','inp-url','inp-exact-time'].forEach(id=>document.getElementById(id).value='');
  selectedTime = ''; selectedParticipants = [];
  renderTimeChips(); renderParticipantChips();
};

window.delItem = function(key) {
  if(confirm('確定刪除？')) remove(ref(db, `kaohsiung-trip/items/${key}`));
};

// ---- Render List ----
function renderList() {
  let items = Object.entries(allItems).map(([k,v])=>({key:k,...v}));
  if(activeTab!=='全部') items=items.filter(i=>i.type===activeTab);
  const container = document.getElementById('list-container');
  if(!items.length) { container.innerHTML='<div class="empty">還沒有地點</div>'; return; }

  // Sort by Time (Default)
  items.sort((a,b)=>{
    const dd=(DAY_ORDER[a.day??'']??3)-(DAY_ORDER[b.day??'']??3);
    if(dd!==0) return dd;
    return (TIME_ORDER[a.time]??4)-(TIME_ORDER[b.time]??4);
  });

  const groups = {};
  items.forEach(i => { const k = i.day || ''; if(!groups[k]) groups[k]=[]; groups[k].push(i); });
  
  const DAY_LABEL={'4/3':'4/3（四）','4/4':'4/4（五）','4/5':'4/5（六）','':'日期未定'};
  
  container.innerHTML = Object.keys(groups).map(day => `
    <div class="day-group">
      <div class="group-header">
        <div class="group-label" style="color:${DAY_COLORS[day]}">${DAY_LABEL[day]}</div>
        <div class="group-line"></div>
      </div>
      ${groups[day].map(item => itemHTML(item)).join('')}
    </div>
  `).join('');
}

function itemHTML(item) {
  const [fg,bg] = TYPE_COLORS[item.type] || ['#8a7f72','#f5f2ed'];
  return `
    <div class="item">
      <div class="item-icon" style="background:${bg}">${iconFor(item.type)}</div>
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        <div class="item-badges">
          <span class="badge" style="background:${bg};color:${fg}">${item.type}</span>
          ${item.day?`<span class="badge" style="background:${DAY_COLORS[item.day]}22;color:${DAY_COLORS[item.day]}">${item.day}</span>`:''}
        </div>
        ${item.opTime ? `<div class="item-op-time">🕒 ${item.opTime}</div>` : ''}
        <div class="item-meta">${item.area ? item.area + '・' : ''}由 ${item.by} 新增</div>
        ${item.time ? `<div class="item-time">${TIME_ICONS[item.time]||'⏰'} ${item.time}</div>` : ''}
        ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        <div class="item-who">${item.participants.map(p=>`<span class="who-pill">${p}</span>`).join('')}</div>
      </div>
      <div class="item-actions">
        <button class="del-btn" onclick="delItem('${item.key}')">×</button>
        ${item.url ? `<a class="map-btn" href="${item.url}" target="_blank">地圖 ↗</a>` : ''}
      </div>
    </div>
  `;
}

function iconFor(t){ 
  const icons = {景點:'📍',小吃:'🍜',咖啡廳:'☕',住宿:'🏨',購物:'🛍️',其他:'📌'};
  return icons[t] || '📌'; 
}

function updateTabs() {
  const items = Object.values(allItems);
  document.getElementById('cnt-all').textContent = items.length;
}

window.setTab = function(t) { activeTab = t; renderList(); };
window.setSort = function(m) { sortMode = m; renderList(); };

// Boot
renderParticipantChips(); renderTypeChips(); renderTimeChips(); initFirebase();
</script>
</body>
</html>
