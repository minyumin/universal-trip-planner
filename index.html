<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>高雄小旅行</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f2ed;--surface:#fff;--surface2:#faf8f5;--border:#e8e3db;
  --text:#1a1612;--muted:#8a7f72;--faint:#c5bdb0;
  --accent:#c85a2a;--accent-light:#f5ede7;
  --blue:#2a6cbf;--blue-l:#e8f0fb;
  --green:#2a7a4a;--green-l:#e8f5ee;
  --amber:#b87a1a;--amber-l:#fdf3e0;
  --purple:#6a4abf;--purple-l:#f0ecfb;
  --red:#bf2a2a;--red-l:#fbe8e8;
  --teal:#1a8a7a;--teal-l:#e8f8f5;
  --pink:#bf2a7a;--pink-l:#fbe8f3;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:200;}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.live{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.main{max-width:500px;margin:0 auto;padding:14px 14px 40px;}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.tab-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;padding-bottom:2px;}
.tab-scroll::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s;}
.tab.active{background:var(--text);color:#fff;border-color:var(--text);}
.cnt{font-size:10px;opacity:.6;margin-left:2px;}

.sort-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--muted);white-space:nowrap;}
.sort-btn.active{border-color:var(--accent);color:var(--accent);}

.map-all-btn{width:100%;padding:10px;background:var(--blue-l);color:var(--blue);border:1px solid #c5d8f5;border-radius:var(--rs);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;margin-bottom:14px;transition:background .15s;}
.map-all-btn:active{background:#d5e6f8;}

/* Add form */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}

.url-row{position:relative;margin-bottom:4px;}
.url-row input{width:100%;padding:9px 64px 9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;}
.url-row input:focus{border-color:var(--accent);}
.parse-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);padding:5px 11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;}
.url-hint{font-size:11px;color:var(--faint);margin-bottom:10px;}
.parsed-ok{font-size:11px;color:var(--green);margin-bottom:10px;display:none;}
.extracted-info{background:var(--green-l);border-radius:var(--rs);padding:8px 10px;margin-bottom:10px;font-size:12px;color:var(--green);display:none;line-height:1.6;}

.sep{height:1px;background:var(--border);margin:10px 0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.grid1{margin-bottom:8px;}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:3px;}
.finp,.fsel{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;}
.finp:focus,.fsel:focus{border-color:var(--accent);}

/* Type + participant chips in form */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.fchip{padding:4px 12px;border-radius:14px;border:1px solid var(--border);font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface2);color:var(--muted);}
.fchip.sel{background:var(--text);color:#fff;border-color:var(--text);}
.type-fchip.sel{border-color:transparent;}

/* Custom type input */
.custom-type-row{display:none;margin-top:6px;}
.custom-type-row input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;width:100%;}

.add-btn{width:100%;margin-top:12px;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;}
.add-btn:active{opacity:.85;}

/* List */
.day-group{margin-bottom:20px;}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.group-label{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.group-line{flex:1;height:1px;background:var(--border);}

.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;display:flex;gap:11px;margin-bottom:8px;}
.item-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;line-height:1.3;}
.item-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center;}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500;}
.item-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.item-time{font-size:11px;color:var(--blue);margin-top:3px;}
.item-note{font-size:12px;color:var(--faint);margin-top:4px;line-height:1.5;}
.item-who{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.who-pill{padding:2px 8px;border-radius:8px;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.item-actions{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.map-btn{padding:4px 9px;background:var(--blue-l);color:var(--blue);border:1px solid #c5d8f5;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;}
.del-btn{padding:3px 6px;background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;line-height:1;}
.del-btn:hover{color:var(--accent);}

.empty{text-align:center;padding:36px 20px;color:var(--faint);font-size:14px;}

/* Color map for types */
/* will be generated dynamically */
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>🌴 高雄小旅行</h1>
      <div class="header-sub" id="trip-sub">共同行程規劃</div>
    </div>
    <div class="live" id="live-badge"><span class="dot"></span>即時同步</div>
  </div>
</div>

<div class="main">

  <!-- Tabs + sort -->
  <div class="toolbar">
    <div class="tab-scroll" id="tabs">
      <button class="tab active" onclick="setTab('全部')">全部 <span class="cnt" id="cnt-all"></span></button>
    </div>
    <button class="sort-btn" id="sort-time-btn" onclick="setSort('time')">⏰ 時間</button>
    <button class="sort-btn" id="sort-area-btn" onclick="setSort('area')">📍 地區</button>
  </div>

  <!-- Open all in maps -->
  <button class="map-all-btn" onclick="openAllMaps()">🗺 在 Google Maps 查看所有地點</button>

  <!-- Add form -->
  <div class="add-card">
    <div class="card-title">新增地點</div>

    <div class="url-row">
      <input id="inp-url" type="url" placeholder="貼上 Google Maps 連結（選填）" oninput="onUrlChange()"/>
      <button class="parse-btn" onclick="parseUrl()">解析</button>
    </div>
    <div class="url-hint" id="url-hint">貼上連結後點「解析」，自動帶入名稱與地區</div>
    <div class="parsed-ok" id="parsed-ok">✓ 已連結 Google Maps</div>
    <div class="extracted-info" id="extracted-info"></div>

    <div class="sep"></div>

    <div class="grid1 field">
      <label>地點名稱 *</label>
      <input class="finp" id="inp-name" placeholder="例：旗津老街"/>
    </div>

    <div class="grid2">
      <div class="field">
        <label>地區</label>
        <input class="finp" id="inp-area" placeholder="例：旗津（自動抓取）"/>
      </div>
      <div class="field">
        <label>時段（選填）</label>
        <div class="chip-row" id="time-chips" style="margin-top:4px;"></div>
        <input class="finp" id="inp-exact-time" type="text" inputmode="numeric" placeholder="輸入時間，如 14:30" style="margin-top:6px;font-size:13px;display:none;" onblur="formatTime(this)"/>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label>日期（選填）</label>
        <select class="fsel" id="inp-day">
          <option value="">未定</option>
          <option value="4/3">4/3（四）</option>
          <option value="4/4">4/4（五）</option>
          <option value="4/5">4/5（六）</option>
        </select>
      </div>
      <div class="field">
        <label>新增者</label>
        <select class="fsel" id="inp-by">
          <option value="">請選擇</option>
          <option value="Pei">Pei</option>
          <option value="Lulu">Lulu</option>
          <option value="Melanie">Melanie</option>
          <option value="Yoyo">Yoyo</option>
          <option value="Min">Min</option>
        </select>
      </div>
    </div>

    <div class="field grid1">
      <label>類型</label>
      <div class="chip-row" id="type-chips"></div>
      <div class="custom-type-row" id="custom-type-row">
        <input id="inp-custom-type" placeholder="輸入自訂類型名稱…" onkeydown="if(event.key==='Enter')confirmCustomType()"/>
      </div>
    </div>

    <div class="field grid1" style="margin-top:8px;">
      <label>參與者（可多選）</label>
      <div class="chip-row" id="participant-chips"></div>
    </div>

    <div class="grid1 field" style="margin-top:8px;">
      <label>備註</label>
      <input class="finp" id="inp-note" placeholder="推薦理由、開放時間、費用…"/>
    </div>

    <button class="add-btn" onclick="addItem()">+ 加入清單</button>
  </div>

  <div id="list-container"><div class="empty">載入中…</div></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, remove, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ====================================================
// 🔧 替換成你的 Firebase 設定
// ====================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDnDKwh2a9qVqDcgZtUjEjh8uCe07FHAzo",
  authDomain: "kaohsiung-trip.firebaseapp.com",
  databaseURL: "https://kaohsiung-trip-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kaohsiung-trip",
  storageBucket: "kaohsiung-trip.firebasestorage.app",
  messagingSenderId: "17984792690",
  appId: "1:17984792690:web:8a4e4734140eb099dffaeb"
};
// ====================================================

const DEFAULT_PARTICIPANTS = ['Pei','Lulu','Melanie','Yoyo','Min'];
const DEFAULT_TYPES = ['景點','小吃','咖啡廳','住宿','購物','其他'];
const TYPE_COLORS = {
  '景點':['#2a6cbf','#e8f0fb'],'小吃':['#b87a1a','#fdf3e0'],
  '咖啡廳':['#2a7a4a','#e8f5ee'],'住宿':['#6a4abf','#f0ecfb'],
  '購物':['#bf2a7a','#fbe8f3'],'其他':['#8a7f72','#f5f2ed']
};
const DAY_COLORS = {'4/3':'#6a4abf','4/4':'#2a7a4a','4/5':'#c85a2a','':`#8a7f72`};
const DAY_ORDER = {'4/3':0,'4/4':1,'4/5':2,'':3};

const TIME_SLOTS = ['上午','中午','下午','晚上'];
const TIME_ORDER = {'上午':0,'中午':1,'下午':2,'晚上':3,'':4};
const TIME_ICONS = {'上午':'🌤','中午':'☀️','下午':'🌇','晚上':'🌙'};

let db, itemsRef, typesRef;
let allItems = {};
let customTypes = [];
let activeTab = '全部';
let sortMode = 'time';
let parsedUrl = '';
let selectedParticipants = [];
let selectedType = '景點';
let selectedTime = '';

function typeColor(t) {
  return TYPE_COLORS[t] || ['#8a7f72','#f5f2ed'];
}

// ---- Firebase init ----
function initFirebase() {
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    itemsRef = ref(db, 'kaohsiung-trip/items');
    typesRef = ref(db, 'kaohsiung-trip/types');

    onValue(itemsRef, snap => { allItems = snap.val() || {}; renderList(); updateTabs(); });
    onValue(typesRef, snap => { customTypes = snap.val() || []; renderTypeChips(); });
  } catch(e) {
    // Demo mode
    allItems = {
    };
    renderList(); updateTabs();
  }
}

// ---- Participant chips in form ----
function renderParticipantChips() {
  const el = document.getElementById('participant-chips');
  el.innerHTML = DEFAULT_PARTICIPANTS.map(p =>
    `<button class="fchip${selectedParticipants.includes(p)?' sel':''}" onclick="toggleParticipant('${p}')">${p}</button>`
  ).join('');
}
window.toggleParticipant = function(p) {
  if(selectedParticipants.includes(p)) selectedParticipants = selectedParticipants.filter(x=>x!==p);
  else selectedParticipants.push(p);
  renderParticipantChips();
};

// ---- Time slot chips ----
function renderTimeChips() {
  const el = document.getElementById('time-chips');
  const isCustom = selectedTime === '自訂';
  el.innerHTML = TIME_SLOTS.map(t => {
    const isSel = selectedTime === t;
    return `<button class="fchip${isSel?' sel':''}" onclick="toggleTime('${t}')">${TIME_ICONS[t]} ${t}</button>`;
  }).join('') +
  `<button class="fchip${isCustom?' sel':''}" onclick="toggleTime('自訂')">🕐 自訂</button>`;
  const exactEl = document.getElementById('inp-exact-time');
  exactEl.style.display = isCustom ? 'block' : 'none';
  if(isCustom) setTimeout(()=>exactEl.focus(), 50);
}
window.toggleTime = function(t) {
  selectedTime = selectedTime === t ? '' : t;
  if(selectedTime !== '自訂') document.getElementById('inp-exact-time').value = '';
  renderTimeChips();
};
function renderTypeChips() {
  const allTypes = [...DEFAULT_TYPES, ...customTypes];
  const el = document.getElementById('type-chips');
  el.innerHTML = allTypes.map(t => {
    const [fg,bg] = typeColor(t);
    const isSel = selectedType===t;
    return `<button class="fchip type-fchip${isSel?' sel':''}" style="${isSel?`background:${bg};color:${fg};border-color:${fg};`:''}" onclick="selectType('${t}')">${t}</button>`;
  }).join('') +
  `<button class="fchip" onclick="showCustomType()">＋ 自訂</button>`;
}
window.selectType = function(t) {
  selectedType = t;
  document.getElementById('custom-type-row').style.display='none';
  renderTypeChips();
};
window.showCustomType = function() {
  document.getElementById('custom-type-row').style.display='block';
  document.getElementById('inp-custom-type').focus();
};
window.confirmCustomType = function() {
  const val = document.getElementById('inp-custom-type').value.trim();
  if(!val) return;
  if(!customTypes.includes(val)) {
    customTypes.push(val);
    if(db) set(typesRef, customTypes);
  }
  selectedType = val;
  document.getElementById('inp-custom-type').value='';
  document.getElementById('custom-type-row').style.display='none';
  renderTypeChips();
};

// ---- Tabs ----
function updateTabs() {
  const items = Object.values(allItems);
  const types = [...new Set(items.map(i=>i.type).filter(Boolean))];
  const builtIn = DEFAULT_TYPES.filter(t => types.includes(t));
  const extra = types.filter(t => !DEFAULT_TYPES.includes(t));
  const allT = [...builtIn, ...extra];

  const el = document.getElementById('tabs');
  el.innerHTML = `<button class="tab${activeTab==='全部'?' active':''}" onclick="setTab('全部')">全部 <span class="cnt">${items.length||''}</span></button>` +
    allT.map(t => {
      const n = items.filter(i=>i.type===t).length;
      return `<button class="tab${activeTab===t?' active':''}" onclick="setTab('${t}')">${t} <span class="cnt">${n||''}</span></button>`;
    }).join('');
}
window.setTab = function(t) {
  activeTab = t; updateTabs(); renderList();
};

// ---- Sort ----
window.setSort = function(mode) {
  sortMode = mode;
  document.getElementById('sort-time-btn').classList.toggle('active', mode==='time');
  document.getElementById('sort-area-btn').classList.toggle('active', mode==='area');
  renderList();
};

// ---- URL parsing ----
window.onUrlChange = function() {
  const v = document.getElementById('inp-url').value.trim();
  if(!v){ parsedUrl=''; document.getElementById('parsed-ok').style.display='none'; document.getElementById('url-hint').style.display='block'; document.getElementById('extracted-info').style.display='none'; }
};

const AREA_KEYWORDS = ['鹽埕','旗津','苓雅','前金','三民','左營','鼓山','楠梓','鳳山','大寮','仁武','橋頭','小港','新興','岡山','湖內','茄萣','永安','彌陀','梓官','路竹','阿蓮','田寮','燕巢','旗山','美濃','六龜','甲仙','杉林','內門','那瑪夏','茂林','桃源'];

function extractFromUrl(url) {
  const decoded = decodeURIComponent(url);
  const extracted = {};

  // 1. /maps/place/NAME/  ← most reliable for full URLs
  let m = decoded.match(/\/maps\/place\/([^\/\?@\+]+)/);
  if(m) {
    extracted.name = m[1].replace(/\+/g,' ').replace(/_/g,' ').trim();
  }

  // 2. ?q=NAME  or  &q=NAME
  if(!extracted.name) {
    m = decoded.match(/[?&]q=([^&@\/]+)/);
    if(m) extracted.name = m[1].replace(/\+/g,' ').trim();
  }

  // 3. search/NAME  (google.com/maps/search/NAME)
  if(!extracted.name) {
    m = decoded.match(/\/maps\/search\/([^\/\?@]+)/);
    if(m) extracted.name = m[1].replace(/\+/g,' ').trim();
  }

  // Clean up common suffixes Google appends
  if(extracted.name) {
    extracted.name = extracted.name
      .replace(/,\s*(台灣|Taiwan|高雄市?|Kaohsiung).*/i,'')
      .replace(/\+/g,' ').trim();
  }

  // Area keywords
  for(const kw of AREA_KEYWORDS){
    if(decoded.includes(kw)){ extracted.area = kw+'區'; break; }
  }

  return extracted;
}

window.parseUrl = async function() {
  const rawUrl = document.getElementById('inp-url').value.trim();
  if(!rawUrl){alert('請先貼上 Google Maps 連結');return;}
  if(!/google\.(com|com\.tw)\/maps|maps\.app\.goo\.gl|goo\.gl\/maps/.test(rawUrl)){alert('請貼上有效的 Google Maps 連結');return;}

  const btn = document.querySelector('.parse-btn');
  btn.textContent = '…';
  btn.disabled = true;

  parsedUrl = rawUrl;

  // For short URLs (maps.app.goo.gl), try to follow redirect via fetch
  let resolvedUrl = rawUrl;
  if(/maps\.app\.goo\.gl|goo\.gl\/maps/.test(rawUrl)) {
    try {
      // Use a CORS proxy approach — fetch the page and look for redirect
      const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(rawUrl)}`, {signal: AbortSignal.timeout(5000)});
      const text = await res.text();
      // Look for the expanded URL in the page content
      const m = text.match(/https:\/\/www\.google\.com\/maps\/place\/[^\s"'<]+/);
      if(m) resolvedUrl = m[0];
    } catch(e) { /* fallback to raw */ }
  }

  const extracted = extractFromUrl(resolvedUrl !== rawUrl ? resolvedUrl : rawUrl);

  btn.textContent = '解析';
  btn.disabled = false;
  document.getElementById('parsed-ok').style.display='block';
  document.getElementById('url-hint').style.display='none';

  const infoEl = document.getElementById('extracted-info');
  infoEl.style.background = 'var(--green-l)';
  infoEl.style.color = 'var(--green)';
  const lines = [];

  if(extracted.name){
    lines.push(`名稱：${extracted.name}`);
    if(!document.getElementById('inp-name').value)
      document.getElementById('inp-name').value = extracted.name;
  }
  if(extracted.area){
    lines.push(`地區：${extracted.area}`);
    if(!document.getElementById('inp-area').value)
      document.getElementById('inp-area').value = extracted.area;
  }

  infoEl.style.display='block';
  if(lines.length){
    infoEl.textContent = '✓ 已自動帶入 — '+lines.join('・');
  } else {
    infoEl.style.background='var(--amber-l)';
    infoEl.style.color='var(--amber)';
    infoEl.textContent = '連結已儲存，請手動輸入地點名稱';
  }
};

// ---- Format time input ----
window.formatTime = function(el) {
  let v = el.value.trim().replace(/[^\d:]/g,'');
  if(!v) return;
  // Accept 1430 → 14:30
  if(/^\d{3,4}$/.test(v)) {
    v = v.length===3 ? '0'+v[0]+':'+v.slice(1) : v.slice(0,2)+':'+v.slice(2);
  }
  // Validate HH:MM
  const m = v.match(/^(\d{1,2}):(\d{2})$/);
  if(m) {
    const h = String(parseInt(m[1])).padStart(2,'0');
    const min = m[2];
    el.value = `${h}:${min}`;
  } else {
    el.value = v; // leave as-is, user can fix
  }
};

// ---- Add item ----
window.addItem = function() {
  const name = document.getElementById('inp-name').value.trim();
  if(!name){document.getElementById('inp-name').focus();return;}

  const customT = document.getElementById('inp-custom-type').value.trim();
  const type = customT || selectedType;

  if(customT && !customTypes.includes(customT)){
    customTypes.push(customT);
    if(db) set(typesRef, customTypes);
  }

  const item = {
    name,
    type,
    day: document.getElementById('inp-day').value,
    area: document.getElementById('inp-area').value.trim() || '',
    time: selectedTime === '自訂' ? (document.getElementById('inp-exact-time').value || '自訂') : selectedTime,
    exactTime: selectedTime === '自訂' ? document.getElementById('inp-exact-time').value : '',
    by: document.getElementById('inp-by').value || '匿名',
    note: document.getElementById('inp-note').value.trim(),
    url: parsedUrl,
    participants: selectedParticipants.length ? [...selectedParticipants] : DEFAULT_PARTICIPANTS,
    ts: Date.now()
  };

  if(db) push(itemsRef, item);
  else { allItems['local'+Date.now()]=item; renderList(); updateTabs(); }

  // reset
  ['inp-name','inp-note','inp-area','inp-url','inp-custom-type','inp-exact-time'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('inp-day').value='';
  parsedUrl='';
  selectedTime='';
  document.getElementById('inp-exact-time').style.display='none';
  selectedParticipants = [];
  document.getElementById('parsed-ok').style.display='none';
  document.getElementById('url-hint').style.display='block';
  document.getElementById('extracted-info').style.display='none';
  document.getElementById('custom-type-row').style.display='none';
  renderParticipantChips();
  renderTimeChips();
};

window.delItem = function(key) {
  if(!confirm('確定刪除這個地點？')) return;
  if(db) remove(ref(db,'kaohsiung-trip/items/'+key));
  else { delete allItems[key]; renderList(); updateTabs(); }
};

// ---- Open all in maps ----
window.openAllMaps = function() {
  const items = Object.values(allItems);
  const withUrl = items.filter(i=>i.url);
  if(!withUrl.length){
    // fallback: search all names
    const names = items.map(i=>i.name).join(' OR ');
    window.open(`https://www.google.com/maps/search/${encodeURIComponent('高雄 '+names)}`, '_blank');
    return;
  }
  // Open first one (browsers block multi-tab), inform user
  window.open(withUrl[0].url,'_blank');
  if(withUrl.length>1) alert(`共 ${withUrl.length} 個有 Maps 連結的地點，已開啟第一個。\n請逐一從清單點「地圖」開啟各地點，或將所有連結加入 Google Maps 我的地圖（My Maps）統一查看。`);
};

// ---- Render list ----
function renderList() {
  let items = Object.entries(allItems).map(([k,v])=>({key:k,...v}));

  // Tab filter
  if(activeTab!=='全部') items=items.filter(i=>i.type===activeTab);

  const container = document.getElementById('list-container');
  if(!items.length){container.innerHTML='<div class="empty">還沒有地點，快來新增吧！</div>';return;}

  if(sortMode==='area'){
    // Group by area
    items.sort((a,b)=>(a.area||'').localeCompare(b.area||'','zh-TW'));
    const groups={};
    items.forEach(i=>{const k=i.area||'未指定地區';if(!groups[k])groups[k]=[];groups[k].push(i);});
    container.innerHTML = Object.entries(groups).map(([area,list])=>`
      <div class="day-group">
        <div class="group-header">
          <div class="group-label" style="color:var(--teal,#1a8a7a)">📍 ${area}</div>
          <div class="group-line"></div>
        </div>
        ${list.map(item=>itemHTML(item)).join('')}
      </div>`).join('');
  } else {
    // Group by day, sort by time within
    items.sort((a,b)=>{
      const dd=(DAY_ORDER[a.day??'']??3)-(DAY_ORDER[b.day??'']??3);
      if(dd!==0)return dd;
      // Sort by exactTime first, then slot order, then insertion
      const aExact = a.exactTime || '';
      const bExact = b.exactTime || '';
      if(aExact && bExact) return aExact.localeCompare(bExact);
      if(aExact) return -1; if(bExact) return 1;
      if(a.time&&b.time) return (TIME_ORDER[a.time]??4)-(TIME_ORDER[b.time]??4);
      if(a.time)return -1; if(b.time)return 1;
      return (a.ts||0)-(b.ts||0);
    });
    const groups={};
    items.forEach(i=>{const k=i.day||'';if(!groups[k])groups[k]=[];groups[k].push(i);});
    const DAY_LABEL={'4/3':'4月3日（四）','4/4':'4月4日（五）','4/5':'4月5日（六）','':'日期未定'};
    const orderedKeys=[...['4/3','4/4','4/5',''].filter(k=>groups[k])];
    container.innerHTML = orderedKeys.map(day=>`
      <div class="day-group">
        <div class="group-header">
          <div class="group-label" style="color:${DAY_COLORS[day]}">${DAY_LABEL[day]||day}</div>
          <div class="group-line"></div>
        </div>
        ${groups[day].map(item=>itemHTML(item)).join('')}
      </div>`).join('');
  }
}

function itemHTML(item) {
  const [fg,bg] = typeColor(item.type);
  const mapBtn = item.url ? `<button class="map-btn" onclick="window.open('${item.url.replace(/'/g,"\\'")}','_blank')">地圖 ↗</button>` : '';
  const whoHtml = item.participants?.length ? `<div class="item-who">${item.participants.map(p=>`<span class="who-pill">${p}</span>`).join('')}</div>` : '';
  const slotIcon = item.time ? (TIME_ICONS[item.time]||'⏰') : '';
  const exactStr = item.exactTime ? ` ${item.exactTime}` : '';
  const timeHtml = (item.time || item.exactTime) ? `<div class="item-time">${slotIcon}${item.time||''}${exactStr}</div>` : '';
  const areaText = item.area ? `${item.area}・` : '';
  return `<div class="item">
    <div class="item-icon" style="background:${bg}">
      ${iconFor(item.type)}
    </div>
    <div class="item-body">
      <div class="item-name">${item.name}</div>
      <div class="item-badges">
        <span class="badge" style="background:${bg};color:${fg}">${item.type}</span>
        ${item.day?`<span class="badge" style="background:${DAY_COLORS[item.day]}22;color:${DAY_COLORS[item.day]}">${item.day}</span>`:''}
      </div>
      <div class="item-meta">${areaText}由 ${item.by} 新增</div>
      ${timeHtml}
      ${item.note?`<div class="item-note">${item.note}</div>`:''}
      ${whoHtml}
    </div>
    <div class="item-actions">
      <button class="del-btn" onclick="delItem('${item.key}')">×</button>
      ${mapBtn}
    </div>
  </div>`;
}

const ICON_MAP={景點:'📍',小吃:'🍜',咖啡廳:'☕',住宿:'🏨',購物:'🛍️',其他:'📌'};
function iconFor(t){ return ICON_MAP[t]||'📌'; }

// ---- Boot ----
renderParticipantChips();
renderTypeChips();
renderTimeChips();
setSort('time');
initFirebase();
</script>
