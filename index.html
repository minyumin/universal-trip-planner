<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>高雄小旅行 4/3–5</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f2ed;
  --surface: #ffffff;
  --surface2: #faf8f5;
  --border: #e8e3db;
  --text: #1a1612;
  --text-muted: #8a7f72;
  --text-faint: #bdb5a8;
  --accent: #c85a2a;
  --accent-light: #f5ede7;
  --blue: #2a6cbf;
  --blue-light: #e8f0fb;
  --green: #2a7a4a;
  --green-light: #e8f5ee;
  --amber: #b87a1a;
  --amber-light: #fdf3e0;
  --purple: #6a4abf;
  --purple-light: #f0ecfb;
  --radius: 12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;}
.header-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.header-dates{font-size:12px;color:var(--text-muted);margin-top:2px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.live-badge{font-size:11px;color:var(--green);display:flex;align-items:center;}

/* Main */
.main{max-width:480px;margin:0 auto;padding:16px;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);font-size:13px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--text-muted);transition:all 0.15s;white-space:nowrap;}
.tab.active{background:var(--text);color:white;border-color:var(--text);}
.tab .count{font-size:11px;opacity:0.6;margin-left:3px;}

/* Add form */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.add-card h3{font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;}
.url-row{position:relative;margin-bottom:4px;}
.url-row input{width:100%;padding:10px 70px 10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s;}
.url-row input:focus{border-color:var(--accent);}
.parse-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:5px 12px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;}
.url-hint{font-size:11px;color:var(--text-faint);margin-bottom:12px;}
.parsed-ok{font-size:11px;color:var(--green);margin-bottom:12px;display:none;}
.sep{height:1px;background:var(--border);margin:12px 0;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:var(--text-muted);font-weight:500;}
input.field-inp,select.field-inp{padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;width:100%;}
input.field-inp:focus,select.field-inp:focus{border-color:var(--accent);}
.add-btn{width:100%;margin-top:12px;padding:12px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
.add-btn:active{opacity:0.8;}

/* List */
.day-group{margin-bottom:20px;}
.day-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.day-label::after{content:'';flex:1;height:1px;background:var(--border);}

.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;position:relative;}
.item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.icon-景點{background:var(--blue-light);}
.icon-小吃{background:var(--amber-light);}
.icon-咖啡廳{background:var(--green-light);}
.item-body{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:500;color:var(--text);line-height:1.3;}
.item-meta{font-size:12px;color:var(--text-muted);margin-top:3px;}
.item-note{font-size:12px;color:var(--text-faint);margin-top:5px;line-height:1.5;}
.item-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.map-link-btn{padding:5px 10px;background:var(--blue-light);color:var(--blue);border:none;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;}
.del-btn{padding:4px 6px;background:none;border:none;color:var(--text-faint);font-size:17px;cursor:pointer;line-height:1;}
.del-btn:hover{color:var(--accent);}

/* Type badge */
.type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;margin-left:6px;vertical-align:middle;}
.badge-景點{background:var(--blue-light);color:var(--blue);}
.badge-小吃{background:var(--amber-light);color:var(--amber);}
.badge-咖啡廳{background:var(--green-light);color:var(--green);}

/* Day colors */
.day-43{color:var(--purple);}
.day-44{color:var(--green);}
.day-45{color:var(--accent);}

.empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:14px;}
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:14px;}

/* Firebase config notice */
.config-notice{background:#fff8e8;border:1px solid #f0d890;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;}
.config-notice h4{font-size:13px;font-weight:700;color:#8a6800;margin-bottom:6px;}
.config-notice p{font-size:12px;color:#a07800;line-height:1.6;}
.config-notice code{background:#fef3c7;padding:1px 5px;border-radius:4px;font-size:11px;font-family:monospace;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>🌴 高雄小旅行</h1>
      <div class="header-dates">4月3日 – 5日・共 4 人</div>
    </div>
    <div class="live-badge" id="live-status">
      <span class="status-dot"></span>即時同步
    </div>
  </div>
</div>

<div class="main">

  <!-- Firebase 設定提示（部署後可刪除） -->
  <div class="config-notice" id="config-notice">
    <h4>⚙️ 首次使用：請設定 Firebase</h4>
    <p>
      1. 前往 <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a> 建立專案<br/>
      2. 新增 Web App，複製 firebaseConfig<br/>
      3. 啟用 <code>Realtime Database</code>（測試模式）<br/>
      4. 將下方 <code>FIREBASE_CONFIG</code> 替換成你的設定<br/>
      5. 把這個 HTML 上傳到 <a href="https://pages.github.com" target="_blank">GitHub Pages</a> 或 <a href="https://app.netlify.com/drop" target="_blank">Netlify Drop</a>，取得網址分享給朋友
    </p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="setTab('全部')">全部 <span class="count" id="cnt-all"></span></button>
    <button class="tab" onclick="setTab('景點')">📍 景點 <span class="count" id="cnt-景點"></span></button>
    <button class="tab" onclick="setTab('小吃')">🍜 小吃 <span class="count" id="cnt-小吃"></span></button>
    <button class="tab" onclick="setTab('咖啡廳')">☕ 咖啡廳 <span class="count" id="cnt-咖啡廳"></span></button>
  </div>

  <div class="add-card">
    <h3>新增地點</h3>
    <div class="url-row">
      <input id="inp-url" type="url" placeholder="貼上 Google Maps 連結（選填）" oninput="onUrlInput()"/>
      <button class="parse-btn" onclick="parseUrl()">解析</button>
    </div>
    <div class="url-hint" id="url-hint">貼上連結後點「解析」，自動帶入名稱</div>
    <div class="parsed-ok" id="parsed-ok">✓ 已連結 Google Maps</div>

    <div class="sep"></div>

    <div class="row2">
      <div class="field" style="grid-column:1/-1;">
        <label>地點名稱 *</label>
        <input class="field-inp" id="inp-name" placeholder="例：旗津老街"/>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>類型</label>
        <select class="field-inp" id="inp-type">
          <option value="景點">📍 景點</option>
          <option value="小吃">🍜 小吃</option>
          <option value="咖啡廳">☕ 咖啡廳</option>
        </select>
      </div>
      <div class="field">
        <label>日期</label>
        <select class="field-inp" id="inp-day">
          <option value="4/3">4/3（四）</option>
          <option value="4/4">4/4（五）</option>
          <option value="4/5">4/5（六）</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>區域</label>
        <input class="field-inp" id="inp-area" placeholder="例：鹽埕區"/>
      </div>
      <div class="field">
        <label>新增者</label>
        <input class="field-inp" id="inp-by" placeholder="你的名字"/>
      </div>
    </div>
    <div class="field">
      <label>備註</label>
      <input class="field-inp" id="inp-note" placeholder="推薦理由、開放時間…"/>
    </div>
    <button class="add-btn" onclick="addItem()">+ 加入清單</button>
  </div>

  <div id="list-container"><div class="loading">連接中…</div></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ====================================================
  // 🔧 替換成你的 Firebase 設定
  // ====================================================
  const FIREBASE_CONFIG = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  // ====================================================

  let db, itemsRef;
  let allItems = {};
  let activeTab = '全部';
  let parsedUrl = '';

  function initFirebase() {
    try {
      const app = initializeApp(FIREBASE_CONFIG);
      db = getDatabase(app);
      itemsRef = ref(db, 'kaohsiung-trip/items');

      // 即時監聽
      onValue(itemsRef, (snapshot) => {
        allItems = snapshot.val() || {};
        render();
      });

      document.getElementById('config-notice').style.display = 'none';
    } catch(e) {
      // Demo mode — no Firebase
      allItems = {
        demo1: {name:'旗津老街',type:'景點',day:'4/3',area:'旗津',note:'搭渡輪前往，黃昏最美',by:'Mia',url:'',ts:Date.now()-5000},
        demo2: {name:'六合夜市',type:'小吃',day:'4/3',area:'前金',note:'必吃木瓜牛奶',by:'Kevin',url:'',ts:Date.now()-4000},
        demo3: {name:'阿嬤的三輪車',type:'咖啡廳',day:'4/4',area:'鹽埕',note:'老屋改建，甜點超讚',by:'Mia',url:'',ts:Date.now()-3000},
        demo4: {name:'棧貳庫',type:'景點',day:'4/5',area:'鹽埕',note:'港邊市集，打卡聖地',by:'Kevin',url:'',ts:Date.now()-2000},
      };
      document.getElementById('live-status').innerHTML = '⚠️ 示範模式';
      render();
    }
  }

  window.addItem = function() {
    const name = document.getElementById('inp-name').value.trim();
    if(!name) { document.getElementById('inp-name').focus(); return; }

    const item = {
      name,
      type: document.getElementById('inp-type').value,
      day: document.getElementById('inp-day').value,
      area: document.getElementById('inp-area').value.trim() || '市區',
      by: document.getElementById('inp-by').value.trim() || '匿名',
      note: document.getElementById('inp-note').value.trim(),
      url: parsedUrl,
      ts: Date.now()
    };

    if(db) {
      push(itemsRef, item);
    } else {
      allItems['demo' + Date.now()] = item;
      render();
    }

    // Reset
    ['inp-name','inp-note','inp-area','inp-url'].forEach(id => document.getElementById(id).value = '');
    parsedUrl = '';
    document.getElementById('parsed-ok').style.display = 'none';
    document.getElementById('url-hint').style.display = 'block';
  };

  window.delItem = function(key) {
    if(db) {
      remove(ref(db, 'kaohsiung-trip/items/' + key));
    } else {
      delete allItems[key];
      render();
    }
  };

  window.onUrlInput = function() {
    const val = document.getElementById('inp-url').value.trim();
    if(!val) { parsedUrl = ''; document.getElementById('parsed-ok').style.display='none'; document.getElementById('url-hint').style.display='block'; }
  };

  window.parseUrl = function() {
    const url = document.getElementById('inp-url').value.trim();
    if(!url) { alert('請先貼上 Google Maps 連結'); return; }
    if(!/google\.(com|com\.tw)\/maps|maps\.app\.goo\.gl|goo\.gl\/maps/.test(url)) { alert('請貼上有效的 Google Maps 連結'); return; }

    parsedUrl = url;
    document.getElementById('parsed-ok').style.display = 'block';
    document.getElementById('url-hint').style.display = 'none';

    // Try to extract name
    let m = url.match(/maps\/place\/([^\/\?@]+)/);
    if(m && !document.getElementById('inp-name').value) {
      document.getElementById('inp-name').value = decodeURIComponent(m[1]).replace(/\+/g,' ');
    }
  };

  window.setTab = function(t) {
    activeTab = t;
    document.querySelectorAll('.tab').forEach(b => {
      const label = b.textContent.replace(/\s*\d+\s*$/, '').trim();
      b.classList.toggle('active', label.includes(t) || (t==='全部' && label.includes('全部')));
    });
    render();
  };

  const ICONS = {景點:'📍',小吃:'🍜',咖啡廳:'☕'};
  const DAY_LABEL = {'4/3':'4月3日（四）','4/4':'4月4日（五）','4/5':'4月5日（六）'};
  const DAY_CLASS = {'4/3':'day-43','4/4':'day-44','4/5':'day-45'};
  const DAY_ORDER = {'4/3':0,'4/4':1,'4/5':2};

  function render() {
    const items = Object.entries(allItems).map(([k,v]) => ({key:k,...v}));
    const filtered = activeTab === '全部' ? items : items.filter(i => i.type === activeTab);
    filtered.sort((a,b) => (DAY_ORDER[a.day]||0) - (DAY_ORDER[b.day]||0) || (a.ts||0) - (b.ts||0));

    // Update counts
    document.getElementById('cnt-all').textContent = items.length || '';
    ['景點','小吃','咖啡廳'].forEach(t => {
      const n = items.filter(i=>i.type===t).length;
      document.getElementById('cnt-'+t).textContent = n || '';
    });

    const container = document.getElementById('list-container');
    if(!filtered.length) { container.innerHTML = '<div class="empty">還沒有地點，快來新增吧！</div>'; return; }

    // Group by day
    const groups = {};
    filtered.forEach(item => {
      const d = item.day || '4/3';
      if(!groups[d]) groups[d] = [];
      groups[d].push(item);
    });

    container.innerHTML = ['4/3','4/4','4/5'].filter(d => groups[d]).map(day => `
      <div class="day-group">
        <div class="day-label ${DAY_CLASS[day]}">${DAY_LABEL[day]}</div>
        ${groups[day].map(item => `
          <div class="item">
            <div class="item-icon icon-${item.type}">${ICONS[item.type]||'📌'}</div>
            <div class="item-body">
              <div class="item-name">${item.name}<span class="type-badge badge-${item.type}">${item.type}</span></div>
              <div class="item-meta">${item.area}・由 ${item.by} 新增</div>
              ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
            </div>
            <div class="item-actions">
              <button class="del-btn" onclick="delItem('${item.key}')">×</button>
              ${item.url ? `<button class="map-link-btn" onclick="window.open('${item.url.replace(/'/g,"\\'")}','_blank')">地圖 ↗</button>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  initFirebase();
</script>
</body>
</html>
