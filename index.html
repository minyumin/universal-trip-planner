<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>萬用行程管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f9fa;--surface:#fff;--border:#eef0f2;
  --text:#2d3436;--muted:#636e72;--accent:#e67e22;
  --blue:#0984e3;--r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);padding-bottom:120px;font-size:14px;}

/* 導覽列 */
.trip-nav{background:#fff; border-bottom:1px solid var(--border); padding:10px 15px; position:sticky; top:0; z-index:200; display:flex; align-items:center; gap:8px; box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.trip-select{flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; font-weight:700; font-size:15px; color:var(--blue); background:#fcfdfe; outline:none;}
.btn-nav{background:var(--blue); color:#fff; border:none; width:38px; height:38px; border-radius:8px; font-weight:700; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:0.2s;}
.btn-nav-edit{background:#fff; color:var(--muted); border:1px solid var(--border);}

.main{max-width:500px; margin:0 auto; padding:15px;}
.card{background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05);}
.field{margin-bottom:14px;}
.field label{display:block; font-size:11px; color:var(--muted); margin-bottom:6px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;}
.finp,.fsel{width:100%; padding:12px; border:1px solid #edf2f7; border-radius:var(--rs); font-size:14px; background:#fcfdfe; outline:none;}

/* 工具列 */
.list-tools { background:#fff; padding:12px; border-radius:var(--rs); margin-bottom:15px; border:1px solid var(--border); display:flex; flex-direction:column; gap:10px; }
.tool-row { display:flex; align-items:center; gap:8px; overflow-x:auto; padding-bottom:4px; }
.tool-label { font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap; }

/* Chips 樣式 */
.chip-row{display:flex; gap:8px; flex-wrap:wrap; user-select:none; margin-bottom:4px;}
.chip{padding:6px 14px; border-radius:20px; border:1px solid #edf2f7; font-size:12px; cursor:pointer; background:#fff; color:var(--muted); font-weight:500; transition:0.2s;}
.chip.sel{background:var(--text); color:#fff; border-color:var(--text);}
.chip-sm { padding:4px 10px; font-size:11px; }
.btn-add-sm{width:28px; height:28px; border-radius:50%; border:1px dashed var(--muted); background:none; cursor:pointer; color:var(--muted); font-size:16px;}

/* 行程項目 */
.item{background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:12px; display:flex; align-items:flex-start; gap:12px;}
.item.editing { border: 2px solid var(--accent); background:#fff9f5; }
.item-check{width:22px; height:22px; margin-top:16px; cursor:pointer; accent-color: var(--blue);}
.item-info{flex:1; min-width:0;}
.item-name{font-size:16px; font-weight:700; color:#2d3436; margin-bottom:4px;}
.item-meta{font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
.info-tag{background:#f1f2f6; padding:2px 8px; border-radius:4px; color:#57606f; font-weight:500; font-size:11px;}

.btn-main{width:100%; padding:15px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); font-weight:700; cursor:pointer;}
.map-gen-fixed{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:92%; max-width:450px; padding:18px; background:var(--blue); color:#fff; border:none; border-radius:35px; font-weight:700; cursor:pointer; box-shadow:0 8px 25px rgba(9, 132, 227, 0.4); z-index:1000; text-align:center;}
.btn-icon{width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:#fff; cursor:pointer; margin-bottom:8px; display:flex; align-items:center; justify-content:center;}
.date-group-hd { margin: 20px 0 10px 5px; font-weight: 700; font-size: 14px; color: var(--blue); display: flex; align-items: center; gap: 10px; }
.date-group-hd::after { content:''; flex:1; height:1px; background: linear-gradient(to right, var(--border), transparent); }
.pill{font-size:10px; background:#f1f2f6; padding:2px 6px; border-radius:4px; color:var(--muted); margin-right:4px;}
</style>
</head>
<body>

<div class="trip-nav">
  <select id="trip-selector" class="trip-select" onchange="switchTrip(this.value)"></select>
  <button class="btn-nav btn-nav-edit" title="修改計畫資訊" onclick="editTripMeta()">✏️</button>
  <button class="btn-nav" title="建立新旅行" onclick="createNewTrip()">+</button>
</div>

<div class="main">
  <div class="card" id="form-container">
    <div class="field"><label>行程地點 *</label><input id="inp-name" class="finp" placeholder="地點名稱"/></div>
    <div class="field"><label>地址</label><input id="inp-addr" class="finp" placeholder="地址或地標"/></div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="field"><label>日期</label><select id="inp-day" class="fsel"></select></div>
      <div class="field"><label>時段 (可新增)</label><div class="chip-row" id="time-chips"></div></div>
    </div>

    <div class="field"><label>分類</label><div class="chip-row" id="type-chips"></div></div>
    <div class="field"><label>參與者</label><div class="chip-row" id="participant-chips"></div></div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="field"><label>營業時間</label><input id="inp-hours" class="finp" placeholder="預設空白"/></div>
      <div class="field"><label>公休日</label><input id="inp-off" class="finp" placeholder="預設空白"/></div>
    </div>

    <div class="field"><label>備註</label><input id="inp-note" class="finp" placeholder="筆記..."/></div>
    <div class="field"><label>Maps 連結</label><input id="inp-url" class="finp" placeholder="貼上連結自動解析名稱" onpaste="setTimeout(parseUrl, 100)"/></div>
    
    <button id="submit-btn" class="btn-main" onclick="submitForm()">儲存行程</button>
    <button id="cancel-btn" style="display:none; width:100%; margin-top:12px; border:none; background:none; color:var(--muted); cursor:pointer;" onclick="resetForm()">取消編輯</button>
  </div>

  <div class="list-tools">
    <div class="tool-row">
        <span class="tool-label">排序:</span>
        <div class="chip-row">
            <div class="chip chip-sm sel" id="sort-time" onclick="setSort('time')">按時間</div>
            <div class="chip chip-sm" id="sort-type" onclick="setSort('type')">按分類</div>
        </div>
    </div>
    <div class="tool-row">
        <span class="tool-label">日期:</span>
        <select id="filter-day" class="fsel" style="padding:4px; font-size:12px;" onchange="renderList()">
            <option value="all">全部日期</option>
        </select>
    </div>
    <div class="tool-row">
        <span class="tool-label">成員:</span>
        <div class="chip-row" id="filter-who-chips"></div>
    </div>
  </div>

  <div id="list-container"></div>
  
  <div style="text-align:center; padding:20px; opacity:0.5;">
    <button style="border:none; background:none; color:var(--muted); font-size:12px; cursor:pointer;" onclick="deleteTrip()">🗑️ 刪除整趟計畫</button>
  </div>
</div>

<button id="map-btn" class="map-gen-fixed" onclick="openMultiMap()">🗺️ 生成地圖路線</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, remove, update, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBBGZFrs0ISC9eTvOYDIaiI5734Q0J3iHw",
  authDomain: "universal-trip-planner-bf963.firebaseapp.com",
  databaseURL: "https://universal-trip-planner-bf963-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "universal-trip-planner-bf963",
  storageBucket: "universal-trip-planner-bf963.firebasestorage.app",
  messagingSenderId: "789155833204",
  appId: "1:789155833204:web:93d67a14c31069120ab821"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);
const DB_PATH = 'universal_trip_planner';

let participantsList = ['Pei','Lulu','Melanie','Yoyo','Min'];
let customTypes = ['景點','小吃','餐廳','咖啡廳','住宿','交通'];
let timeSlots = ['早晨','上午','午餐','下午','晚餐','深夜'];
const TIME_RANK = { "早晨":1, "上午":2, "午餐":3, "下午":4, "晚餐":5, "深夜":6, "":7 };

let trips = {}, currentTripID = '', allItems = [], editingKey = null;
let selectedType = '景點', selectedWho = [], selectedTime = '';
let currentSort = 'time', filterWho = 'all';

// 初始化與監聽
onValue(ref(db, `${DB_PATH}/meta`), snap => {
  trips = snap.val() || {};
  const select = document.getElementById('trip-selector');
  const entries = Object.entries(trips);
  if(entries.length === 0) return select.innerHTML = '<option value="">請點擊 + 建立計畫</option>';
  select.innerHTML = entries.map(([id, t]) => `<option value="${id}">${t.name}</option>`).join('');
  if(!currentTripID) switchTrip(entries[0][0]);
  else refreshTripData();
});

window.switchTrip = (id) => {
  if(!id) return;
  currentTripID = id;
  refreshTripData();
};

function refreshTripData() {
  const trip = trips[currentTripID];
  if(!trip) return;
  const dates = getDatesArray(trip.start, trip.end);
  
  // 更新所有日期下拉選單
  const opts = dates.map(d => `<option value="${d}">${d}</option>`).join('');
  document.getElementById('filter-day').innerHTML = '<option value="all">全部日期</option>' + opts;
  document.getElementById('inp-day').innerHTML = '<option value="">未定</option>' + opts;
  
  // 監聽該行程的細項
  onValue(ref(db, `${DB_PATH}/data/${currentTripID}/items`), snap => {
    allItems = Object.entries(snap.val() || {}).map(([key, val]) => ({ key, ...val }));
    renderList();
  });
  
  selectedWho = [...participantsList];
  renderFormUI();
  renderFilterUI();
}

// 核心功能：建立與修改
window.createNewTrip = async () => {
  const n = prompt("計畫名稱："); if(!n) return;
  const s = prompt("起始日 (YYYY-MM-DD)", "2026-04-03");
  const e = prompt("結束日 (YYYY-MM-DD)", "2026-04-05");
  if(s && e) {
    const r = push(ref(db, `${DB_PATH}/meta`));
    await set(r, { name:n, start:s, end:e });
    switchTrip(r.key);
  }
};

window.editTripMeta = async () => {
    if(!currentTripID) return;
    const trip = trips[currentTripID];
    const n = prompt("修改名稱：", trip.name); if(!n) return;
    const s = prompt("修改起始日 (YYYY-MM-DD)：", trip.start);
    const e = prompt("修改結束日 (YYYY-MM-DD)：", trip.end);
    if(s && e) {
        await update(ref(db, `${DB_PATH}/meta/${currentTripID}`), { name:n, start:s, end:e });
        alert("修改成功");
    }
};

// UI 渲染邏輯
window.renderFormUI = () => {
  document.getElementById('time-chips').innerHTML = timeSlots.map(t => `<div class="chip chip-sm ${selectedTime===t?'sel':''}" onclick="selectTime('${t}')">${t}</div>`).join('') + `<button class="btn-add-sm" onclick="addTimeSlot()">+</button>`;
  document.getElementById('type-chips').innerHTML = customTypes.map(t => `<div class="chip chip-sm ${selectedType===t?'sel':''}" onclick="selectType('${t}')">${t}</div>`).join('') + `<button class="btn-add-sm" onclick="addType()">+</button>`;
  const whoHtml = [`<div class="chip chip-sm ${selectedWho.length===participantsList.length?'sel':''}" onclick="toggleAllWho()">全員</div>`].concat(participantsList.map(p => `<div class="chip chip-sm ${selectedWho.includes(p)?'sel':''}" onclick="toggleWho('${p}')">${p}</div>`));
  document.getElementById('participant-chips').innerHTML = whoHtml.join('') + `<button class="btn-add-sm" onclick="addWho()">+</button>`;
};

window.renderFilterUI = () => {
    document.getElementById('filter-who-chips').innerHTML = `<div class="chip chip-sm ${filterWho==='all'?'sel':''}" onclick="setFilterWho('all')">全部</div>` + participantsList.map(p => `<div class="chip chip-sm ${filterWho===p?'sel':''}" onclick="setFilterWho('${p}')">${p}</div>`).join('');
};

window.renderList = () => {
  const fDay = document.getElementById('filter-day').value;
  let list = allItems.filter(i => (fDay === 'all' || i.day === fDay) && (filterWho === 'all' || (i.who && i.who.includes(filterWho))));

  list.sort((a,b) => {
      if(currentSort === 'time') {
          if(a.day !== b.day) return (a.day || '9/9') > (b.day || '9/9') ? 1 : -1;
          return (TIME_RANK[a.time] || 99) - (TIME_RANK[b.time] || 99);
      }
      return (a.type || '') > (b.type || '') ? 1 : -1;
  });

  let html = '', lastGroup = '';
  list.forEach(item => {
    const groupKey = currentSort === 'time' ? (item.day || "日期未定") : (item.type || "未分類");
    if(groupKey !== lastGroup) { html += `<div class="date-group-hd">${currentSort==='time'?'📅':'🏷️'} ${groupKey}</div>`; lastGroup = groupKey; }
    html += `
    <div class="item ${editingKey === item.key ? 'editing' : ''}">
      <input type="checkbox" class="item-check" data-name="${item.name}" checked>
      <div class="item-info">
        <div class="item-name">${item.name} <span class="info-tag">${item.type}</span></div>
        <div class="item-meta">${currentSort==='type'?'📅 '+item.day+' | ':''}⏰ ${item.time || '未定'}${item.addr ? ` | 📍 ${item.addr}` : ''}</div>
        <div class="item-meta">
            ${item.hours ? `<span class="info-tag">🕒 ${item.hours}</span>` : ''}
            ${item.off ? `<span class="info-tag" style="color:#e74c3c;">🚫 休：${item.off}</span>` : ''}
        </div>
        <div style="margin:6px 0;">${(item.who || []).map(w => `<span class="pill">${w}</span>`).join('')}</div>
        ${item.note ? `<div style="font-size:12px; color:var(--accent); background:#fff9f5; padding:6px; border-radius:4px;">💡 ${item.note}</div>` : ''}
        <div style="margin-top:8px;"><a href="${item.url || '#'}" target="_blank" style="color:var(--blue); font-size:12px; font-weight:bold; text-decoration:none;">🗺️ 查看地圖</a></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <button class="btn-icon" onclick="editItem('${item.key}')">✏️</button>
        <button class="btn-icon" onclick="delItem('${item.key}')">🗑️</button>
      </div>
    </div>`;
  });
  document.getElementById('list-container').innerHTML = html || '<div style="text-align:center; padding:50px; color:var(--muted);">目前沒有行程項目</div>';
};

// 工具函式
function getDatesArray(s, e) {
  let a = [], d = new Date(s.replace(/-/g, '/')), ed = new Date(e.replace(/-/g, '/'));
  d.setHours(12,0,0,0); ed.setHours(12,0,0,0);
  while(d <= ed) {
    a.push(`${d.getMonth()+1}/${d.getDate()} ( ${["日","一","二","三","四","五","六"][d.getDay()]} )`);
    d.setDate(d.getDate()+1);
  }
  return a;
}

window.openMultiMap = () => {
  const checked = document.querySelectorAll('.item-check:checked');
  if (checked.length === 0) return alert("請勾選行程");
  const prefix = trips[currentTripID] ? trips[currentTripID].name.replace(/之旅|旅行/g, '') : "";
  const locations = Array.from(checked).map(cb => encodeURIComponent(prefix + " " + cb.getAttribute('data-name')));
  let url = (locations.length === 1) 
    ? `https://www.google.com/maps/search/?api=1&query=${locations[0]}`
    : `https://www.google.com/maps/dir/?api=1&origin=${locations[0]}&destination=${locations[locations.length-1]}&waypoints=${locations.slice(1,-1).join('|')}&travelmode=driving`;
  window.open(url, '_blank');
};

// 介面交互
window.submitForm = () => {
  const name = document.getElementById('inp-name').value.trim();
  if(!name) return alert("地點必填");
  const data = {
    name, addr: document.getElementById('inp-addr').value, day: document.getElementById('inp-day').value,
    time: selectedTime, type: selectedType, who: selectedWho,
    hours: document.getElementById('inp-hours').value, off: document.getElementById('inp-off').value,
    note: document.getElementById('inp-note').value, url: document.getElementById('inp-url').value, ts: Date.now()
  };
  const target = `${DB_PATH}/data/${currentTripID}/items`;
  if(editingKey) update(ref(db, `${target}/${editingKey}`), data);
  else push(ref(db, target), data);
  resetForm();
};

window.editItem = (key) => {
  const i = allItems.find(x => x.key === key);
  editingKey = key;
  ['name','addr','day','hours','off','note','url'].forEach(f => document.getElementById('inp-'+f).value = i[f] || '');
  selectedTime = i.time; selectedType = i.type; selectedWho = i.who || [];
  document.getElementById('submit-btn').innerText = "儲存修改";
  document.getElementById('cancel-btn').style.display = 'block';
  renderFormUI(); window.scrollTo({top:0, behavior:'smooth'});
};

window.resetForm = () => {
  editingKey = null;
  ['inp-name','inp-addr','inp-hours','inp-off','inp-note','inp-url'].forEach(id => document.getElementById(id).value = '');
  selectedTime = ''; selectedWho = [...participantsList];
  document.getElementById('submit-btn').innerText = "儲存行程";
  document.getElementById('cancel-btn').style.display = 'none';
  renderFormUI();
};

window.delItem = (key) => { if(confirm("確定刪除此地點？")) remove(ref(db, `${DB_PATH}/data/${currentTripID}/items/${key}`)); };
window.deleteTrip = () => { if(confirm("確定刪除整趟計畫？")) { remove(ref(db, `${DB_PATH}/meta/${currentTripID}`)); remove(ref(db, `${DB_PATH}/data/${currentTripID}`)); location.reload(); } };
window.parseUrl = () => { setTimeout(() => {
    const v = document.getElementById('inp-url').value;
    const m = decodeURIComponent(v).match(/\/place\/([^\/\?]+)/);
    if(m) document.getElementById('inp-name').value = m[1].replace(/\+/g, ' ');
}, 100);};

window.selectTime = (t) => { selectedTime = t; renderFormUI(); };
window.selectType = (t) => { selectedType = t; renderFormUI(); };
window.toggleWho = (p) => { selectedWho = selectedWho.includes(p) ? selectedWho.filter(x=>x!==p) : [...selectedWho, p]; renderFormUI(); };
window.toggleAllWho = () => { selectedWho = (selectedWho.length === participantsList.length) ? [] : [...participantsList]; renderFormUI(); };
window.setSort = (s) => { currentSort = s; document.getElementById('sort-time').classList.toggle('sel', s==='time'); document.getElementById('sort-type').classList.toggle('sel', s==='type'); renderList(); };
window.setFilterWho = (w) => { filterWho = w; renderFilterUI(); renderList(); };
window.addTimeSlot = () => { const t = prompt("時段："); if(t) { timeSlots.push(t); selectedTime = t; renderFormUI(); } };
window.addWho = () => { const n = prompt("成員："); if(n) { participantsList.push(n); selectedWho.push(n); renderFormUI(); renderFilterUI(); } };
window.addType = () => { const t = prompt("分類："); if(t) { customTypes.push(t); selectedType = t; renderFormUI(); } };

renderFormUI();
</script>
</body>
</html>
