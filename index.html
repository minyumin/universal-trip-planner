<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>高雄小旅行行程規劃</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f2ed;--surface:#fff;--surface2:#faf8f5;--border:#e8e3db;
  --text:#1a1612;--muted:#8a7f72;--faint:#c5bdb0;
  --accent:#c85a2a;--accent-light:#f5ede7;
  --blue:#2a6cbf;--blue-l:#e8f0fb;
  --green:#2a7a4a;--green-l:#e8f5ee;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:200;}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:16px;font-weight:700;}

.main{max-width:500px;margin:0 auto;padding:14px;}

/* Add form */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}

.url-row{position:relative;margin-bottom:4px;}
.url-row input{width:100%;padding:9px 64px 9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface2);outline:none;}
.parse-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);padding:5px 11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;}

.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;margin-top:10px;}
.finp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface2);outline:none;}

/* List items */
.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;gap:12px;}
.item-body{flex:1;}
.item-name{font-size:15px;font-weight:700;}
.item-op-time{font-size:11px;color:var(--amber,#b87a1a);margin-top:4px;display:flex;align-items:center;gap:4px;}
.item-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.item-actions{display:flex;flex-direction:column;gap:5px;}
.map-btn{padding:4px 8px;background:var(--blue-l);color:var(--blue);border:1px solid #c5d8f5;border-radius:6px;font-size:11px;cursor:pointer;text-decoration:none;text-align:center;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>🌴 高雄行程助手</h1>
  </div>
</div>

<div class="main">
  <div class="add-card">
    <div class="card-title">新增行程地點</div>
    
    <div class="url-row">
      <input id="inp-url" type="url" placeholder="貼上 Google Maps 連結"/>
      <button class="parse-btn" onclick="parseUrl()">解析</button>
    </div>

    <div class="field">
      <label>地點名稱 *</label>
      <input class="finp" id="inp-name" placeholder="解析連結後自動填入"/>
    </div>

    <div class="field">
      <label>營業時間（選填）</label>
      <input class="finp" id="inp-op-time" placeholder="例如：09:00 - 21:00"/>
    </div>

    <div class="field">
      <label>備註</label>
      <input class="finp" id="inp-note" placeholder="想吃什麼、必買清單..."/>
    </div>

    <button onclick="addItem()" style="width:100%;margin-top:15px;padding:12px;background:var(--text);color:#fff;border-radius:var(--rs);border:none;cursor:pointer;">加入清單</button>
  </div>

  <div id="list-container"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDnDKwh2a9qVqDcgZtUjEjh8uCe07FHAzo",
  authDomain: "kaohsiung-trip.firebaseapp.com",
  databaseURL: "https://kaohsiung-trip-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kaohsiung-trip",
  storageBucket: "kaohsiung-trip.firebasestorage.app",
  messagingSenderId: "17984792690",
  appId: "1:17984792690:web:8a4e4734140eb099dffaeb"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);
const itemsRef = ref(db, 'kaohsiung-trip/items');

// 解析 URL 功能
window.parseUrl = async function() {
  const url = document.getElementById('inp-url').value.trim();
  if(!url) return;

  const btn = document.querySelector('.parse-btn');
  btn.textContent = '...';

  // 簡易解析邏輯：從連結中尋找名稱
  try {
    const decoded = decodeURIComponent(url);
    // 嘗試匹配 /place/名稱/
    let nameMatch = decoded.match(/\/place\/([^\/\?]+)/);
    if(nameMatch) {
      let name = nameMatch[1].replace(/\+/g, ' ');
      document.getElementById('inp-name').value = name;
    }
  } catch(e) {
    console.error("解析失敗", e);
  }
  
  btn.textContent = '解析';
};

window.addItem = function() {
  const name = document.getElementById('inp-name').value.trim();
  const opTime = document.getElementById('inp-op-time').value.trim();
  const note = document.getElementById('inp-note').value.trim();
  const url = document.getElementById('inp-url').value.trim();

  if(!name) return alert("請輸入地點名稱");

  push(itemsRef, {
    name,
    opTime,
    note,
    url,
    ts: Date.now()
  });

  // 清空
  ['inp-name','inp-op-time','inp-note','inp-url'].forEach(id=>document.getElementById(id).value='');
};

window.delItem = function(key) {
  if(confirm("確定刪除？")) remove(ref(db, `kaohsiung-trip/items/${key}`));
}

onValue(itemsRef, snap => {
  const data = snap.val() || {};
  const container = document.getElementById('list-container');
  container.innerHTML = Object.entries(data).reverse().map(([key, item]) => `
    <div class="item">
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        ${item.opTime ? `<div class="item-op-time">🕒 營業時間：${item.opTime}</div>` : ''}
        ${item.note ? `<div class="item-meta">💡 ${item.note}</div>` : ''}
      </div>
      <div class="item-actions">
        <button class="map-btn" style="background:#eee;border:none;color:#888;" onclick="delItem('${key}')">刪除</button>
        ${item.url ? `<a class="map-btn" href="${item.url}" target="_blank">地圖</a>` : ''}
      </div>
    </div>
  `).join('');
});
</script>
</body>
</html>
